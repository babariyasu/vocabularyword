<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymleaf.org/extras/spring-security">

<head>
	<div th:replace="~{fragment :: meta}"></div>
	<div th:replace="~{fragment :: styles}"></div>
	<title>単語帳</title>
</head>

<body>
	<div th:replace="~{fragment :: header}"></div>
	<main>
		<h1 th:text="${book.title}"></h1>
		<!-- <a th:href="@{/vocabulary-books/{id}/study(id=${book.id})}">単語帳を開く</a> -->
		
		<a th:href="@{/vocabulary-books/{id}/study(id=${book.id})}">単語帳を開く</a>

		<div>
			<button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addWordModal">単語を追加する</button>
		</div>
		<ul>
			<li th:each="word : ${words}">
				<a href="#" th:text="${word.name}"></a>
				<a href="#" th:text="${word.meaning}"></a>
				<button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#editModal" th:data-id="${word.id}" 
					th:data-name="${word.name}" th:data-meaning="${word.meaning}">編集</button>
				<button class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#deleteModal"
					th:data-word-id="${word.id}">削除</button>
			</li>
		</ul>

		<!-- 単語追加モーダル -->
		<div class="modal fade" id="addWordModal" tabindex="-1">
			<div class="modal-dialog">
				<div class="modal-content">

					<div class="modal-header">
						<h5 class="modal-title">単語追加</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
					</div>

					<form th:action="@{/words/create}" method="post">

						<!-- CSRF -->
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

						<!-- どの単語帳かを送る -->
						<input type="hidden" name="vocabularyBookId" th:value="${book.id}" />

						<div class="modal-body">

							<div class="mb-3">
								<label class="form-label">単語</label>
								<input type="text" class="form-control" name="name" required>
							</div>

							<div class="mb-3">
								<label class="form-label">意味</label>
								<input type="text" class="form-control" name="meaning" required>
							</div>

						</div>

						<div class="modal-footer">
							<button type="submit" class="btn btn-primary">
								保存
							</button>
							<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
								キャンセル
							</button>
						</div>

					</form>

				</div>
			</div>
		</div>

		<!-- 編集モーダル -->
		<div class="modal fade" id="editModal" tabindex="-1">
			<div class="modal-dialog">
				<div class="modal-content">

					<div class="modal-header">
						<h5 class="modal-title">単語編集</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
					</div>

					<form id="editForm" method="post">

						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

						<div class="modal-body">

							<div class="mb-3">
								<label class="form-label">単語</label>
								<input type="text" id="editName" name="name" class="form-control" required>
							</div>

							<div class="mb-3">
								<label class="form-label">意味</label>
								<input type="text" id="editMeaning" name="meaning" class="form-control" required>
							</div>

						</div>

						<div class="modal-footer">
							<button type="submit" class="btn btn-primary">
								保存
							</button>
							<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
								キャンセル
							</button>
						</div>

					</form>

				</div>
			</div>
		</div>

		<!-- 削除確認モーダル -->
		<div class="modal fade" id="deleteModal" tabindex="-1">
			<div class="modal-dialog">
				<div class="modal-content">

					<div class="modal-header">
						<h5 class="modal-title">削除確認</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
					</div>

					<div class="modal-body">
						本当に削除しますか？
					</div>

					<div class="modal-footer">

						<form id="deleteForm" method="post">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

							<button type="submit" class="btn btn-danger">
								削除する
							</button>
						</form>

						<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
							キャンセル
						</button>

					</div>
				</div>
			</div>
		</div>
	</main>
	<div th:replace="~{fragment :: footer}"></div>
	<div th:replace="~{fragment :: scripts}"></div>

	<script>
		document.addEventListener("DOMContentLoaded", function () {

			const editModal = document.getElementById("editModal");

			editModal.addEventListener("show.bs.modal", function (event) {

				const button = event.relatedTarget;

				const id = button.getAttribute("data-id");
				const name = button.getAttribute("data-name");
				const meaning = button.getAttribute("data-meaning");

				document.getElementById("editName").value = name;
				document.getElementById("editMeaning").value = meaning;

				const form = document.getElementById("editForm");
				form.action = "/words/" + id + "/update";
			});
		});
	</script>

	<script>
		document.addEventListener("DOMContentLoaded", function () {

			const deleteModal = document.getElementById("deleteModal");

			deleteModal.addEventListener("show.bs.modal", function (event) {

				const button = event.relatedTarget;
				const wordId = button.getAttribute("data-word-id");

				const form = document.getElementById("deleteForm");

				form.action = "/words/" + wordId + "/delete";
			});
		});
	</script>
</body>

</html>
